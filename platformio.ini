; ===============================================================================
; PlatformIO Project Configuration
; ESP32 3-Phase Smart Climate & Voltage Monitor
; Board: ESP32-S3 (converted from original ESP32)
; ===============================================================================

[env:esp32-s3]
platform  = espressif32@6.6.0
board     = esp32-s3-devkitc-1
framework = arduino

; Serial monitor baud rate
monitor_speed = 115200

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DUSER_SETUP_LOADED=1
    -include "$PROJECT_DIR/User_Setup.h"
    ; --- Pin map from board_config.h (ESP32-S3 N16R8) ---
    -DTFT_MOSI=13
    -DTFT_MISO=12
    -DTFT_SCLK=14
    -DTFT_CS=4
    -DTFT_DC=9
    -DTFT_RST=15
    -DTFT_BL=11
    -DTOUCH_CS=18
    -DSPI_FREQUENCY=10000000
    -DSPI_READ_FREQUENCY=10000000
    -DSPI_TOUCH_FREQUENCY=1000000

; Library dependencies (PlatformIO will auto-download these)
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    bblanchon/ArduinoJson @ ^6.21.5
    knolleary/PubSubClient @ ^2.8

; Partition scheme — use large app partition so the firmware fits
board_build.partitions = huge_app.csv

; Upload speed
upload_speed = 921600

